<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Dhenifer</title>
    
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.85em' font-size='80'%3E❤️%3C/text%3E%3Cline x1='15' y1='82' x2='85' y2='82' stroke='%23e74c3c' stroke-width='5' stroke-linecap='round'/%3E%3C/svg%3E" type="image/svg+xml" />
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playwrite+ID:wght@100..400&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playwrite+NZ:wght@100..400&display=swap" rel="stylesheet">
    
<style>
        @font-face {
            font-family: 'Aston Script';
            src: local('Aston Script'), local('AstonScript'),
                 url('https://fonts.gstatic.com/s/aston-script/v1/aston-script.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            background: #f0ebe5;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0.2rem;
            font-family: system-ui, -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        .container {
            width: 100%;
            max-width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 0.1rem;
        }

        .carta-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            perspective: 1200px;
            position: relative;
            height: 100%;
        }

        .carta-papel {
            width: 100%;
            max-width: 95%;
            aspect-ratio: 16 / 11;
            position: relative;
            cursor: pointer;
            overflow: visible;
            transition: transform 0.7s cubic-bezier(0.23, 1, 0.32, 1);
            transform-style: preserve-3d;
            background: transparent !important;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
            margin: 0 auto;
        }

        .carta-papel:focus-visible {
            outline: none;
        }

        .fundo-carta {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none;
            z-index: 0;
            background: transparent !important;
            display: block;
            transition: transform 0.3s ease;
        }

        .imagem-carta {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none;
            z-index: 1;
            transition: transform 0.4s ease, opacity 0.4s ease, filter 0.4s ease;
            background: transparent !important;
            display: block;
        }

        .conteudo-interno {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
            opacity: 0;
            transform: scale(0.7) translateZ(-100px) rotateX(15deg);
            transition: all 0.7s cubic-bezier(0.23, 1, 0.32, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8% 10%;
        }

        .imagem-interna {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: transparent !important;
            display: block;
            transition: transform 0.3s ease;
        }

        .texto-sobreposto {
            position: absolute;
            font-family: 'Aston Script', cursive;
            color: #4a2c2a;
            font-size: clamp(0.5rem, 2.2vw, 1.2rem);
            text-align: left;
            line-height: 1.2;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            pointer-events: none;
            z-index: 3;
            padding: 0.1rem 0.3rem;
            max-width: 82%;
            word-wrap: break-word;
            background: transparent !important;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%) !important;
            width: auto;
            white-space: pre-wrap;
            letter-spacing: 0.01em;
        }

        .texto-sobreposto .cursor-blink {
            display: inline-block;
            width: 1.5px;
            height: 0.8em;
            background: currentColor;
            margin-left: 1px;
            animation: piscar 0.7s step-end infinite;
            vertical-align: text-bottom;
        }

        @keyframes piscar {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .lapis-animado {
            position: absolute;
            z-index: 4;
            pointer-events: none;
            object-fit: contain;
            background: transparent !important;
            transition: transform 0.12s ease;
            opacity: 0;
            transform-origin: center center;
            width: 8%;
            height: 8%;
            min-width: 14px;
            min-height: 14px;
            max-width: 30px;
            max-height: 30px;
        }

        .lapis-animado.visivel {
            opacity: 1;
        }

        .carta-papel.aberta {
            transform: scale(1.04) translateZ(50px) rotateY(-1.5deg);
            z-index: 10;
        }

        .carta-papel.aberta .imagem-carta {
            opacity: 0.12;
            transform: scale(0.88) translateZ(-35px);
            filter: blur(2px);
        }

        .carta-papel.aberta .conteudo-interno {
            opacity: 1;
            transform: scale(1) translateZ(15px) rotateX(0deg);
        }

        /* CELULAR - AUMENTA A IMAGEM E DIMINUI O TEXTO */
        @media (max-width: 480px) {
            body {
                padding: 0.1rem;
            }
            
            .container {
                padding: 0;
                max-height: 100vh;
            }
            
            .carta-wrapper {
                max-height: 100vh;
            }
            
            .carta-papel {
                max-width: 98%;
                aspect-ratio: 16 / 12;
            }
            
            .conteudo-interno {
                padding: 6% 8%;
            }
            
            .texto-sobreposto {
            font-size: clamp(0.55rem, 2.4vw, 1.2rem);
            max-width: 85%;
            padding: 0.1rem 0.3rem;
            letter-spacing: 0.005em;
            }
            
            .lapis-animado {
                width: 7%;
                height: 7%;
                min-width: 12px;
                min-height: 12px;
                max-width: 24px;
                max-height: 24px;
            }
        }

        @media (max-width: 380px) {
            .carta-papel {
                aspect-ratio: 16 / 13;
            }
            
            .texto-sobreposto {
                font-size: clamp(0.4rem, 1.8vw, 0.9rem);
                max-width: 88%;
                padding: 0.05rem 0.2rem;
            }
            
            .conteudo-interno {
                padding: 5% 6%;
            }
            
            .lapis-animado {
                width: 6%;
                height: 6%;
                min-width: 10px;
                min-height: 10px;
                max-width: 20px;
                max-height: 20px;
            }
        }

        @media (min-width: 768px) {
            .carta-papel {
                max-width: 480px;
                aspect-ratio: 16 / 10;
            }
            
            .texto-sobreposto {
                font-size: clamp(1.2rem, 2.5vw, 2.5rem);
                max-width: 70%;
                padding: 0.3rem 0.8rem;
            }
            
            .lapis-animado {
                width: 10%;
                height: 10%;
                max-width: 45px;
                max-height: 45px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="carta-wrapper">
            <div class="carta-papel" id="cartaPapel" role="button" tabindex="0" aria-label="Abrir carta">

                <img class="fundo-carta" id="fundoCarta" src="" alt="Fundo da carta" />
                <img class="imagem-carta" id="imagemCarta" src="" alt="Imagem da carta" />

                <div class="conteudo-interno" id="conteudoInterno">
                    <img class="imagem-interna" id="imagemInterna" src="" alt="Conteúdo da carta" />
                    <div class="texto-sobreposto" id="textoSobreposto"></div>
                    <img class="lapis-animado" id="lapisAnimado" src="" alt="Lápis" />
                </div>

            </div>
        </div>
    </div>

    <script>
        (function() {
            var carta = document.getElementById('cartaPapel');
            var fundoCarta = document.getElementById('fundoCarta');
            var imgCarta = document.getElementById('imagemCarta');
            var imgInterna = document.getElementById('imagemInterna');
            var textoSobreposto = document.getElementById('textoSobreposto');
            var lapisAnimado = document.getElementById('lapisAnimado');

            var URL_DADOS = 'https://raw.githubusercontent.com/Mikill73/Dhenifer/refs/heads/main/configuracoes.json';

            var STORAGE_FUNDO = 'carta_1mes_imagem_fundo';
            var STORAGE_CARTA = 'carta_1mes_imagem_carta';
            var STORAGE_INTERNA = 'carta_1mes_imagem_interna';
            var STORAGE_LAPIS = 'carta_1mes_imagem_lapis';
            var STORAGE_SOM_ABRIR = 'carta_1mes_som_abrir';
            var STORAGE_SOM_ESCREVER = 'carta_1mes_som_escrever';
            var STORAGE_CONFIG_FUNDO = 'carta_1mes_config_fundo';
            var STORAGE_CONFIG_CARTA = 'carta_1mes_config_carta';
            var STORAGE_CONFIG_INTERNA = 'carta_1mes_config_interna';
            var STORAGE_CONFIG_LAPIS = 'carta_1mes_config_lapis';
            var STORAGE_CONFIG_TEXTO = 'carta_1mes_config_texto';
            var STORAGE_CONFIG_SOM = 'carta_1mes_config_som';

            var TODAS_CHAVES = [
                STORAGE_FUNDO, STORAGE_CARTA, STORAGE_INTERNA, STORAGE_LAPIS,
                STORAGE_SOM_ABRIR, STORAGE_SOM_ESCREVER,
                STORAGE_CONFIG_FUNDO, STORAGE_CONFIG_CARTA, STORAGE_CONFIG_INTERNA,
                STORAGE_CONFIG_LAPIS, STORAGE_CONFIG_TEXTO, STORAGE_CONFIG_SOM
            ];

            var FONTES = {
                'aston': 'Aston Script',
                'playwrite-id': 'Playwrite ID',
                'playwrite-nz': 'Playwrite NZ'
            };

            var animacaoTimeout = null;
            var animacaoCancelada = false;
            var textoCompleto = '';
            var posicaoLetraAtual = 0;
            var estaAberto = false;
            var somAbrir = null;
            var somEscrever = null;
            var somEscreverTocado = false;

            function carregarImagemStorage(chave) {
                return localStorage.getItem(chave);
            }

            function carregarConfig(chave) {
                var dados = localStorage.getItem(chave);
                return dados ? JSON.parse(dados) : null;
            }

            function tocarSom(som) {
                if (som) {
                    try {
                        som.currentTime = 0;
                        som.play().catch(function() {});
                    } catch(e) {}
                }
            }

            function pararSom(som) {
                if (som) {
                    try {
                        som.pause();
                        som.currentTime = 0;
                    } catch(e) {}
                }
            }

            function pararAnimacao() {
                animacaoCancelada = true;
                if (animacaoTimeout) {
                    clearTimeout(animacaoTimeout);
                    animacaoTimeout = null;
                }
                if (somEscrever) {
                    pararSom(somEscrever);
                }
                somEscreverTocado = false;
            }

            function tocarSomEscrever() {
                if (somEscrever && !somEscreverTocado) {
                    somEscreverTocado = true;
                    try {
                        somEscrever.currentTime = 0;
                        somEscrever.play().catch(function() {});
                    } catch(e) {}
                }
            }

            function iniciarAnimacaoEscrita() {
                pararAnimacao();
                
                var configTexto = carregarConfig(STORAGE_CONFIG_TEXTO);
                var texto = configTexto ? configTexto.texto : 'Feliz 1 mês! ❤️';
                textoCompleto = texto;
                posicaoLetraAtual = 0;
                animacaoCancelada = false;
                somEscreverTocado = false;
                
                textoSobreposto.textContent = '';
                
                var cursor = document.createElement('span');
                cursor.className = 'cursor-blink';
                textoSobreposto.appendChild(cursor);
                
                var velocidade = configTexto ? (configTexto.velocidade || 80) : 80;
                var posX = 50;
                var posY = 50;
                
                var configLapis = carregarConfig(STORAGE_CONFIG_LAPIS);
                var rotacaoLapisBase = configLapis ? (configLapis.rotacao || -30) : -30;
                var tamanhoLapisBase = configLapis ? (configLapis.tamanho || 60) : 60;
                
                function escreverProximaLinha() {
                    if (animacaoCancelada) return;
                    
                    if (posicaoLetraAtual < textoCompleto.length) {
                        var letra = textoCompleto.charAt(posicaoLetraAtual);
                        var cursorElement = textoSobreposto.querySelector('.cursor-blink');
                        
                        if (cursorElement) {
                            cursorElement.remove();
                        }
                        
                        textoSobreposto.textContent += letra;
                        
                        var novoCursor = document.createElement('span');
                        novoCursor.className = 'cursor-blink';
                        textoSobreposto.appendChild(novoCursor);
                        
                        var progresso = (posicaoLetraAtual + 1) / textoCompleto.length;
                        var angulo = progresso * 0.8 - 0.4;
                        var raio = 10 + (1 - progresso) * 6;
                        
                        var offsetX = Math.sin(angulo * 2) * raio * 0.5;
                        var offsetY = Math.cos(angulo * 1.5) * raio * 0.3 - progresso * 3;
                        
                        var lapisX = posX + offsetX * 0.4;
                        var lapisY = posY + offsetY * 0.4 + progresso * 2;
                        
                        lapisAnimado.style.left = lapisX + '%';
                        lapisAnimado.style.top = lapisY + '%';
                        
                        lapisAnimado.style.transform = 'translate(-50%, -50%) rotate(' + (rotacaoLapisBase + (1 - progresso) * 8) + 'deg) scale(' + (tamanhoLapisBase / 100) + ')';
                        
                        if (letra !== ' ') {
                            tocarSomEscrever();
                        }
                        
                        posicaoLetraAtual++;
                        
                        var atraso = letra === ' ' ? velocidade * 0.2 : velocidade;
                        animacaoTimeout = setTimeout(escreverProximaLinha, atraso);
                    } else {
                        var cursorElement = textoSobreposto.querySelector('.cursor-blink');
                        if (cursorElement) {
                            cursorElement.remove();
                        }
                        
                        lapisAnimado.style.left = '58%';
                        lapisAnimado.style.top = '54%';
                        
                        animacaoTimeout = null;
                        if (somEscrever) {
                            pararSom(somEscrever);
                        }
                        somEscreverTocado = false;
                    }
                }
                
                setTimeout(escreverProximaLinha, 300);
            }

            function carregarSomStorage(chave) {
                var dados = localStorage.getItem(chave);
                if (dados) {
                    try {
                        var audio = new Audio(dados);
                        audio.preload = 'auto';
                        return audio;
                    } catch(e) {
                        return null;
                    }
                }
                return null;
            }

            function aplicarDados() {
                var fundoDados = carregarImagemStorage(STORAGE_FUNDO);
                if (fundoDados) {
                    fundoCarta.src = fundoDados;
                    fundoCarta.style.display = 'block';
                } else {
                    fundoCarta.style.display = 'none';
                }

                var cartaDados = carregarImagemStorage(STORAGE_CARTA);
                if (cartaDados) {
                    imgCarta.src = cartaDados;
                    imgCarta.style.display = 'block';
                } else {
                    imgCarta.style.display = 'none';
                }

                var internaDados = carregarImagemStorage(STORAGE_INTERNA);
                if (internaDados) {
                    imgInterna.src = internaDados;
                    imgInterna.style.display = 'block';
                } else {
                    imgInterna.style.display = 'none';
                }

                var configLapis = carregarConfig(STORAGE_CONFIG_LAPIS);
                var lapisDados = carregarImagemStorage(STORAGE_LAPIS);
                if (lapisDados) {
                    lapisAnimado.src = lapisDados;
                    lapisAnimado.style.display = 'block';
                    if (configLapis) {
                        var rot = configLapis.rotacao || -30;
                        var tam = configLapis.tamanho || 60;
                        lapisAnimado.style.transform = 'rotate(' + rot + 'deg) scale(' + (tam / 100) + ')';
                    }
                } else {
                    lapisAnimado.style.display = 'none';
                }

                var configTexto = carregarConfig(STORAGE_CONFIG_TEXTO);
                if (configTexto) {
                    var fonte = configTexto.fonte || 'aston';
                    var nomeFonte = FONTES[fonte] || 'Aston Script';
                    textoSobreposto.style.fontFamily = '\'' + nomeFonte + '\', cursive';
                    textoSobreposto.style.color = configTexto.cor || '#4a2c2a';
                }

                somAbrir = carregarSomStorage(STORAGE_SOM_ABRIR);
                somEscrever = carregarSomStorage(STORAGE_SOM_ESCREVER);
            }

            function carregarDados() {
                fetch(URL_DADOS)
                    .then(function(response) {
                        if (!response.ok) {
                            throw new Error('HTTP ' + response.status);
                        }
                        return response.json();
                    })
                    .then(function(dados) {
                        for (var chave in dados) {
                            if (dados.hasOwnProperty(chave) && TODAS_CHAVES.indexOf(chave) !== -1) {
                                localStorage.setItem(chave, dados[chave]);
                            }
                        }
                        aplicarDados();
                    })
                    .catch(function() {
                        aplicarDados();
                    });
            }

            function abrirCarta() {
                if (carta.classList.contains('aberta')) {
                    carta.classList.remove('aberta');
                    carta.setAttribute('aria-label', 'Carta fechada');
                    estaAberto = false;
                    pararAnimacao();
                    textoSobreposto.textContent = '';
                    lapisAnimado.classList.remove('visivel');
                    return;
                }
                
                tocarSom(somAbrir);
                
                var configSom = carregarConfig(STORAGE_CONFIG_SOM);
                var tempo = configSom ? (configSom.tempoAbertura || 700) : 700;
                carta.style.transition = 'transform ' + tempo + 'ms cubic-bezier(0.23, 1, 0.32, 1)';
                
                carta.classList.add('aberta');
                carta.setAttribute('aria-label', 'Carta aberta');
                estaAberto = true;
                
                var lapisDados = carregarImagemStorage(STORAGE_LAPIS);
                if (lapisDados) {
                    lapisAnimado.classList.add('visivel');
                    lapisAnimado.style.left = '46%';
                    lapisAnimado.style.top = '46%';
                    var configLapis = carregarConfig(STORAGE_CONFIG_LAPIS);
                    var rot = configLapis ? (configLapis.rotacao || -30) : -30;
                    var tam = configLapis ? (configLapis.tamanho || 60) : 60;
                    lapisAnimado.style.transform = 'translate(-50%, -50%) rotate(' + rot + 'deg) scale(' + (tam / 100) + ')';
                }
                
                setTimeout(function() {
                    iniciarAnimacaoEscrita();
                }, Math.min(tempo * 0.4, 400));
            }

            carta.addEventListener('click', function(e) {
                e.stopPropagation();
                abrirCarta();
            });

            carta.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    abrirCarta();
                }
            });

            carregarDados();

            window.addEventListener('resize', function() {
                var isMobile = window.innerWidth <= 480;
                if (isMobile) {
                    document.querySelector('.container').style.padding = '0.1rem';
                }
            });
        })();
    </script>

</body>
</html>
