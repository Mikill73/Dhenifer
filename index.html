<style>
        @font-face {
            font-family: 'Aston Script';
            src: local('Aston Script'), local('AstonScript'),
                 url('https://fonts.gstatic.com/s/aston-script/v1/aston-script.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            background: #f0ebe5;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0.2rem;
            font-family: system-ui, -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        .container {
            width: 100%;
            max-width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 0.1rem;
        }

        .carta-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            perspective: 1200px;
            position: relative;
            height: 100%;
        }

        .carta-papel {
            width: 100%;
            max-width: 95%;
            aspect-ratio: 16 / 11;
            position: relative;
            cursor: pointer;
            overflow: visible;
            transition: transform 0.7s cubic-bezier(0.23, 1, 0.32, 1);
            transform-style: preserve-3d;
            background: transparent !important;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
            margin: 0 auto;
        }

        .carta-papel:focus-visible {
            outline: none;
        }

        .fundo-carta {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none;
            z-index: 0;
            background: transparent !important;
            display: block;
            transition: transform 0.3s ease;
        }

        .imagem-carta {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none;
            z-index: 1;
            transition: transform 0.4s ease, opacity 0.4s ease, filter 0.4s ease;
            background: transparent !important;
            display: block;
        }

        .conteudo-interno {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
            opacity: 0;
            transform: scale(0.7) translateZ(-100px) rotateX(15deg);
            transition: all 0.7s cubic-bezier(0.23, 1, 0.32, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8% 10%;
        }

        .imagem-interna {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: transparent !important;
            display: block;
            transition: transform 0.3s ease;
        }

        .texto-sobreposto {
            position: absolute;
            font-family: 'Aston Script', cursive;
            color: #4a2c2a;
            font-size: clamp(0.5rem, 2.2vw, 1.2rem);
            text-align: left;
            line-height: 1.2;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            pointer-events: none;
            z-index: 3;
            padding: 0.1rem 0.3rem;
            max-width: 82%;
            word-wrap: break-word;
            background: transparent !important;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%) !important;
            width: auto;
            white-space: pre-wrap;
            letter-spacing: 0.01em;
        }

        .texto-sobreposto .cursor-blink {
            display: inline-block;
            width: 1.5px;
            height: 0.8em;
            background: currentColor;
            margin-left: 1px;
            animation: piscar 0.7s step-end infinite;
            vertical-align: text-bottom;
        }

        @keyframes piscar {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .lapis-animado {
            position: absolute;
            z-index: 4;
            pointer-events: none;
            object-fit: contain;
            background: transparent !important;
            transition: transform 0.12s ease;
            opacity: 0;
            transform-origin: center center;
            width: 8%;
            height: 8%;
            min-width: 14px;
            min-height: 14px;
            max-width: 30px;
            max-height: 30px;
        }

        .lapis-animado.visivel {
            opacity: 1;
        }

        .carta-papel.aberta {
            transform: scale(1.04) translateZ(50px) rotateY(-1.5deg);
            z-index: 10;
        }

        .carta-papel.aberta .imagem-carta {
            opacity: 0.12;
            transform: scale(0.88) translateZ(-35px);
            filter: blur(2px);
        }

        .carta-papel.aberta .conteudo-interno {
            opacity: 1;
            transform: scale(1) translateZ(15px) rotateX(0deg);
        }

        @media (max-width: 480px) {
            body {
                padding: 0.1rem;
            }
            
            .container {
                padding: 0;
                max-height: 100vh;
            }
            
            .carta-wrapper {
                max-height: 100vh;
            }
            
            .carta-papel {
                max-width: 98%;
                aspect-ratio: 16 / 12;
            }
            
            .conteudo-interno {
                padding: 6% 8%;
            }
            
            .texto-sobreposto {
            font-size: clamp(0.55rem, 2.4vw, 1.2rem);
            max-width: 85%;
            padding: 0.1rem 0.3rem;
            letter-spacing: 0.005em;
            }
            
            .lapis-animado {
                width: 7%;
                height: 7%;
                min-width: 12px;
                min-height: 12px;
                max-width: 24px;
                max-height: 24px;
            }
        }

        @media (max-width: 380px) {
            .carta-papel {
                aspect-ratio: 16 / 13;
            }
            
            .texto-sobreposto {
                font-size: clamp(0.4rem, 1.8vw, 0.9rem);
                max-width: 88%;
                padding: 0.05rem 0.2rem;
            }
            
            .conteudo-interno {
                padding: 5% 6%;
            }
            
            .lapis-animado {
                width: 6%;
                height: 6%;
                min-width: 10px;
                min-height: 10px;
                max-width: 20px;
                max-height: 20px;
            }
        }

        @media (min-width: 768px) {
            .carta-papel {
                max-width: 480px;
                aspect-ratio: 16 / 10;
            }
            
            .texto-sobreposto {
                font-size: clamp(1.2rem, 2.5vw, 2.5rem);
                max-width: 70%;
                padding: 0.3rem 0.8rem;
            }
            
            .lapis-animado {
                width: 10%;
                height: 10%;
                max-width: 45px;
                max-height: 45px;
            }
        }
    </style>
